set -g default-terminal "screen-256color"
# set-option -g default-terminal "rxvt-unicode-256color"
set-option -sa terminal-overrides ',xterm*:Tc'

set -g allow-passthrough on
set -g visual-activity off

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

set -g set-titles on
set -g set-titles-string "#T"

set -g status-justify centre

bind c new-window -c "#{pane_current_path}"

#tmux default keybind is C-a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g status-style fg=default,bg=default
set -g pane-active-border-style bg=default,fg="#555555"
set -g pane-border-style fg="#333333"

# change split horizontal and vertical
unbind %
bind | split-window -h -c "#{pane_current_path}"

bind u swap-pane -U

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# reload tmux source file
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# tmux sessionizer
bind-key -r f run-shell "tmux neww /usr/local/bin/tmux-sessionizer"

set -sg escape-time 5

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on


# -- vim mode --
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi 'd' send -X delete-selection
# --

# tpm plugin
set -g @plugin 'tmux-plugin/tpm'

# list of tmux plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'wfxr/tmux-fzf-url' # open urls in tmux

# --- palette ---
set -g @c_bg        "#080808"
set -g @c_bg_alt    "#191919"
set -g @c_border    "#2A2A2A"

set -g @c_text      "#CCCCCC"
set -g @c_primary   "#AAAAAA"
set -g @c_secondary "#7A7A7A"
set -g @c_muted     "#555555"

set -g @c_error     "#D70000"
set -g @c_warn      "#FFAA88"
set -g @c_hint      "#7788AA"
set -g @c_lack      "#708090"
set -g @c_special   "#789978"

# --- status ---
set -g status-style fg="#{@c_text}",bg=default
set -g status-interval 1
set -g status-right-length 100

# left (no border, reacts to prefix)
set -g status-left-length 100
set -g status-left " #[fg=#{?client_prefix,#{@c_error},#{@c_primary}}] #S "

# right (clean separators)
set -g status-right "#[fg=#{@c_special}] #{b:pane_current_path} #[fg=#{@c_border}]| #[fg=#{@c_hint}] #H #[fg=#{@c_border}]| #[fg=#{@c_muted}]󰃰 %H:%M:%S"

# --- windows ---
set -g window-status-format "#[fg=#{@c_secondary}]#I:#W"
set -g window-status-current-format "#[fg=#{@c_primary},bold] #I:#W"
set -g window-status-separator " #[fg=#{@c_border}]| "

# --- panes ---
set -g pane-border-style fg="#{@c_border}"
set -g pane-active-border-style fg="#{@c_primary}"

# --- messages / alerts ---
set -g message-style fg="#{@c_text}",bg="#{@c_bg_alt}"
set -g window-status-bell-style fg="#{@c_error}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
